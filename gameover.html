<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemo Adventure - Game Over</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container fade-in">
        <h1 id="resultTitle">Game Over</h1>
        <p id="resultMessage">The round has ended.</p>
        <p id="resultMode" class="mode-summary">Mode: Normal</p>

        <div class="gameover-actions">
            <button id="playAgainButton">Play Again</button>
            <button id="homeButton" class="secondary-button">Home</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
