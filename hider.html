<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemo Adventure - Hider Setup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container fade-in">
        <h1>Hide Nemo</h1>
        <p>Player 1: Choose a secret fantasy region to hide Nemo.</p>

        <p id="modeSummary" class="mode-summary">Mode: Normal</p>

        <div class="hider-controls">
            <select id="countrySelect">
                <!-- Populated by script.js -->
            </select>
            <br>
            <button id="hideButton">Hide Nemo</button>
            <button id="backHomeButton" class="secondary-button">Back to Home</button>
        </div>

        <div id="linkSection">
            <p><strong>Nemo is hidden.</strong> Share this link with Player 2:</p>
            <span id="generatedUrl"></span>
            <button id="copyButton">Copy Link</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
